# Keep THIS repo's committed architecture baseline (.codeboarding/analysis.json
# + rendered docs) current on every push to main, so the PR review workflow
# always diffs against an up-to-date baseline. Uses the published action's
# sync mode, which has the seed step (builds static_analysis.pkl with .sha)
# and the incremental→full fallback that the old hand-rolled pipeline lacked.

name: CodeBoarding Documentation (Direct)

on:
  push:
    branches:
      - master
      - main
    # Loop guard: don't re-trigger on the files this workflow itself commits.
    paths-ignore:
      - '.codeboarding/*.md'
      - '.codeboarding/analysis.json'
      - '.codeboarding/codeboarding_version.json'
      - '.codeboarding/health/**'
      - 'docs/development/architecture.md'
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Ignore the committed baseline and rebuild it from scratch (full analysis).'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: codeboarding-baseline-writers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: CodeBoarding/CodeBoarding-action@v1
        with:
          mode: sync
          depth_level: '2'
          force_full: ${{ inputs.force_full || false }}
          llm_api_key: ${{ secrets.OPENROUTER_API_KEY }}

name: Integration Tests

on:
  # Manual trigger with optional language filter
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to test (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - python
          - java
          - go
          - typescript
          - php
          - javascript

  # Run on merge to main
  push:
    branches: [main]

  # Run on pull requests that touch install/bootstrap code, so regressions in
  # the Node.js bootstrap path (which only surfaces on Node-less machines —
  # see the "Mask system Node.js" step below) are caught in PR review rather
  # than after merge.  Filtered by paths to avoid burning CI minutes on docs
  # or agent/LLM-provider changes that can't affect LSP startup.
  pull_request:
    branches: [main]
    paths:
      - 'install.py'
      - 'tool_registry.py'
      - 'vscode_constants.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'static_analyzer/**'
      - 'tests/integration/**'
      - 'tests/test_install.py'
      - 'tests/test_tool_registry.py'
      - '.github/workflows/integration-tests.yml'

  # Scheduled run (weekly, to catch regressions)
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM UTC

jobs:
  # Determine which languages to test based on input
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.set-languages.outputs.languages }}
    steps:
      - name: Set languages matrix
        id: set-languages
        run: |
          if [ "${{ github.event.inputs.language }}" = "" ] || [ "${{ github.event.inputs.language }}" = "null" ]; then
            echo 'languages=["python", "java", "go", "typescript", "php", "javascript"]' >> $GITHUB_OUTPUT
          else
            echo "languages=[\"${{ github.event.inputs.language }}\"]" >> $GITHUB_OUTPUT
          fi

  # Run integration tests for each language in parallel
  integration-tests:
    needs: setup-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Integration tests can be slow
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.setup-matrix.outputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Setup virtual environment
        run: |
          source .venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Install Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Java 21
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install system dependencies
        if: matrix.language == 'php'
        run: |
          sudo apt-get update
          sudo apt-get install -y php

      - name: Mask system Node.js (force ensure_node_runtime path)
        # ubuntu-latest runners ship Node.js pre-installed, which would let
        # codeboarding-setup skip the Node-bootstrap code path entirely. We
        # remove every known Node location so the next step has to exercise
        # the real install.ensure_node_runtime() -> nodeenv download path.
        # This is the only CI guarantee that a Node-less user environment
        # actually works — without it, a regression would pass CI and only
        # surface when a real user hit
        #   FileNotFoundError: [Errno 2] No such file or directory: 'cli.mjs'
        #
        # If this step ever starts failing with "node still on PATH", a future
        # runner image has added a new Node location. Extend the purge below.
        # Do NOT "fix" it by deleting this step — that would silently
        # invalidate the clean-environment test and let the original bug
        # regress.
        run: |
          set -euo pipefail
          sudo rm -f /usr/local/bin/node /usr/local/bin/npm /usr/local/bin/npx
          sudo rm -rf /opt/hostedtoolcache/node
          NEW_PATH=$(echo "$PATH" | tr ':' '\n' | grep -viE '(hostedtoolcache/node|/nvm/|/\.nvm/)' | paste -sd:)
          echo "PATH=$NEW_PATH" >> "$GITHUB_ENV"
          for var in $(env | grep -iE '^(npm_|NODE_)' | cut -d= -f1); do
            echo "$var=" >> "$GITHUB_ENV"
          done
          export PATH="$NEW_PATH"
          if command -v node >/dev/null 2>&1; then
            echo "ERROR: node still on PATH at $(command -v node)" >&2
            echo "A runner image update has added a new Node location." >&2
            exit 1
          fi
          if command -v npm >/dev/null 2>&1; then
            echo "ERROR: npm still on PATH at $(command -v npm)" >&2
            exit 1
          fi
          echo "System Node.js successfully masked."

      - name: Setup LSP servers
        run: codeboarding-setup --auto-install-npm

      - name: Verify embedded Node was installed
        # Belt-and-braces: prove the previous step actually downloaded Node
        # via nodeenv rather than silently skipping Node-dependent languages.
        # If this step fails but the bootstrap looked successful, check the
        # install.py logs for "Node.js bootstrap finished: success".
        run: |
          test -x ~/.codeboarding/servers/nodeenv/bin/node
          ~/.codeboarding/servers/nodeenv/bin/node --version
          ~/.codeboarding/servers/nodeenv/bin/npm --version

      - name: Run integration tests (${{ matrix.language }})
        run: pytest -m "integration and ${{ matrix.language }}_lang" -v -s --tb=long --log-cli-level=INFO

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.language }}
          path: |
            /tmp/actual_*.json
          retention-days: 7
          if-no-files-found: ignore

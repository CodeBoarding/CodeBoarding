name: Integration Tests

# The integration suite lives in a private repository. This workflow dispatches
# it and mirrors the result; it never downloads the tests, and it prints no test
# output, so nothing about the suite reaches this repo's public logs.
#
# Fork PRs deliberately do not run it. GitHub withholds secrets from fork-PR
# workflows, and the ways around that (pull_request_target, a workflow_run hop)
# all end with contributor-authored code executing on the same runner as the
# private suite - at which point the suite is readable by that code, whatever the
# approval gate says. Fork PRs get the public unit tests and
# bootstrap-verification.yml; the private suite covers their changes on the
# push-to-main run right after merge.
#
# To check a fork PR before merging, read the diff, then dispatch
# `run-integration-tests.yml` in the private repo with that PR's head SHA.

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to test (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - python
          - java
          - go
          - typescript
          - php
          - javascript
          - rust
          - csharp
      full_matrix:
        description: 'Run all 3 OSes instead of the smoke subset'
        required: false
        default: false
        type: boolean

  push:
    branches: [main]

  # PRs that touch analysis, install or scanner code.
  pull_request:
    paths:
      - 'install.py'
      - 'tool_registry/**'
      - 'vscode_constants.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'static_analyzer/**'
      - 'repo_utils/ignore.py'
      - 'agents/model_capabilities.py'
      - 'agents/llm_config.py'
      - 'health/**'
      - '.github/workflows/integration-tests.yml'

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  private-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    # Fork PRs get no secrets, so this cannot run for them - the condition makes
    # that explicit rather than letting the job fail on an empty token.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Mint a short-lived installation token instead of carrying a PAT. It is
      # narrowed to the tests repo and to Actions, so the worst a leak from this
      # public workflow yields is the ability to start a test run - not to read
      # the suite (no `contents`) and not to touch any other org repo.
      - name: Mint a token for the private repo
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CODEBOARDING_APP_CLIENT_ID }}
          private-key: ${{ secrets.CODEBOARDING_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: CodeBoarding-tests
          permission-actions: write

      - name: Dispatch and await the private suite
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRIVATE_REPO: CodeBoarding/CodeBoarding-tests
          WORKFLOW: run-integration-tests.yml
          ENGINE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          LANGUAGE: ${{ github.event.inputs.language }}
          FULL_MATRIX: ${{ github.event.inputs.full_matrix }}
        run: |
          set -euo pipefail

          # `set -u` will not catch this: an unavailable token expands to the
          # empty string, and gh would fail later with an opaque 404. Fail closed
          # - an unverifiable suite must never read as a passing one.
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Could not mint a CodeBoarding App token. Check CODEBOARDING_APP_CLIENT_ID and CODEBOARDING_APP_PRIVATE_KEY. See CONTRIBUTING.md."
            exit 1
          fi

          # Tag the run so we can find the one *we* started. Timestamps alone
          # race: two PRs dispatching at once would each adopt the newer run.
          dispatch_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # Only forward `language` when set, so the receiving workflow applies
          # its own default (all languages) rather than an empty choice value.
          args=(-f "engine_ref=$ENGINE_SHA" -f "dispatch_id=$dispatch_id")
          [ -n "$LANGUAGE" ] && args+=(-f "language=$LANGUAGE")
          [ "$FULL_MATRIX" = "true" ] && args+=(-f "full_matrix=true")
          gh workflow run "$WORKFLOW" --repo "$PRIVATE_REPO" "${args[@]}"

          # `gh workflow run` returns no run id, so poll for the run whose
          # run-name carries our dispatch id.
          run_id=""
          for _ in $(seq 1 24); do
            sleep 5
            # Match either field: GitHub surfaces an evaluated run-name as
            # `name`, and depending on event also as `displayTitle`.
            run_id=$(gh run list --repo "$PRIVATE_REPO" --workflow "$WORKFLOW" \
              --event workflow_dispatch --limit 30 \
              --json databaseId,name,displayTitle \
              -q "[.[] | select(((.name // \"\") + \" \" + (.displayTitle // \"\")) | contains(\"[$dispatch_id]\"))] | first | .databaseId" \
              2>/dev/null || true)
            [ -n "$run_id" ] && [ "$run_id" != "null" ] && break
          done

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::error::Dispatched the private suite but could not find its run."
            exit 1
          fi

          run_url="https://github.com/$PRIVATE_REPO/actions/runs/$run_id"
          echo "Private integration run: $run_url"
          echo "Waiting for it to finish. Logs stay in the private repo."

          # Poll rather than `gh run watch`: watch cannot authenticate with a
          # fine-grained PAT (it needs checks:read, which they cannot grant), and
          # its exit code conflates "suite failed" with "gh failed" anyway. The
          # run's own conclusion is the only trustworthy signal. Bounded here and
          # by the job's timeout-minutes.
          conclusion=""
          for _ in $(seq 1 140); do
            conclusion=$(gh run view "$run_id" --repo "$PRIVATE_REPO" \
              --json status,conclusion \
              -q 'if .status == "completed" then .conclusion else "" end' 2>/dev/null || echo "")
            [ -n "$conclusion" ] && break
            sleep 30
          done

          {
            echo "### Private integration tests: \`${conclusion:-unknown}\`"
            echo ""
            echo "Engine commit: \`$ENGINE_SHA\`"
            echo ""
            echo "Full output is in the private repo (maintainers only): [run $run_id]($run_url)"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$conclusion" ]; then
            echo "::error::Timed out waiting for the private run to finish; it may still be going. See $run_url"
            exit 1
          fi

          if [ "$conclusion" != "success" ]; then
            echo "::error::Private integration tests concluded '$conclusion'. See $run_url"
            exit 1
          fi

  fork-notice:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Explain why the private suite was skipped
        run: |
          {
            echo "### Integration tests not run"
            echo ""
            echo "The integration suite is private and does not run on pull requests"
            echo "from forks. A maintainer will run it against this branch before merge."
            echo ""
            echo "Unit tests and bootstrap verification cover this PR in the meantime."
          } >> "$GITHUB_STEP_SUMMARY"
